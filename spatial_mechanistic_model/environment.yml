name: spatial_pinn
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip

  # Deep learning — matched to HPC (CUDA 12.8, PyTorch 2.7.0)
  - pytorch=2.7.0
  - pytorch-cuda=12.4
  - numpy=2.2.5

  # Scientific Python stack
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn
  - tqdm

  # Single-cell / spatial analysis (for preprocessing scripts)
  - scanpy>=1.9
  - anndata>=0.10
  - leidenalg

  # Utilities
  - pyyaml>=6.0

  - pip:
    - scvelo>=0.3.0         # RNA velocity utilities
